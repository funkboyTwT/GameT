<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Update</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --bg: #050508;
    --surface: #0d0d14;
    --border: #1a1a2e;
    --accent: #00ff9d;
    --accent2: #ff2d78;
    --accent3: #7b2fff;
    --text: #c8d6e5;
    --dim: #4a5568;
    --glow: 0 0 20px rgba(0,255,157,0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* Grid bg */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,157,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,157,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ===== LOGIN SCREEN ===== */
  #login-screen {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    background: var(--bg);
  }

  .login-box {
    width: 420px;
    border: 1px solid var(--accent);
    background: var(--surface);
    box-shadow: 0 0 40px rgba(0,255,157,0.15), inset 0 0 40px rgba(0,255,157,0.03);
    padding: 48px;
    position: relative;
  }

  .login-box::before {
    content: '';
    position: absolute;
    top: -1px; left: 20px;
    width: 60px; height: 2px;
    background: var(--bg);
  }

  .login-box::after {
    content: '';
    position: absolute;
    bottom: -1px; right: 20px;
    width: 60px; height: 2px;
    background: var(--bg);
  }

  .corner {
    position: absolute;
    width: 12px; height: 12px;
    border-color: var(--accent2);
    border-style: solid;
  }
  .corner.tl { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
  .corner.tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
  .corner.bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
  .corner.br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

  .login-logo {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 6px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 6px;
    opacity: 0.7;
  }

  .login-title {
    font-family: 'Orbitron', monospace;
    font-size: 26px;
    font-weight: 900;
    color: #fff;
    margin-bottom: 4px;
    letter-spacing: 2px;
  }

  .login-title span { color: var(--accent); }

  .login-sub {
    font-size: 11px;
    color: var(--dim);
    margin-bottom: 40px;
    letter-spacing: 2px;
  }

  .input-group {
    position: relative;
    margin-bottom: 24px;
  }

  .input-label {
    display: block;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--dim);
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .input-group input {
    width: 100%;
    background: rgba(0,255,157,0.03);
    border: 1px solid var(--border);
    border-bottom-color: var(--accent);
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    font-size: 18px;
    letter-spacing: 8px;
    padding: 12px 16px;
    outline: none;
    transition: all 0.3s;
    caret-color: var(--accent);
  }

  .input-group input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 16px rgba(0,255,157,0.2);
    background: rgba(0,255,157,0.06);
  }

  .login-btn {
    width: 100%;
    padding: 14px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Orbitron', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 4px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .login-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    transform: translateX(-100%);
    transition: transform 0.3s;
    z-index: -1;
  }

  .login-btn:hover {
    color: var(--bg);
    box-shadow: var(--glow);
  }

  .login-btn:hover::before { transform: translateX(0); }

  .login-error {
    font-size: 11px;
    color: var(--accent2);
    letter-spacing: 2px;
    margin-top: 16px;
    text-align: center;
    min-height: 16px;
    animation: shake 0.4s ease;
  }

  @keyframes shake {
    0%,100%{transform:translateX(0)}
    20%{transform:translateX(-6px)}
    40%{transform:translateX(6px)}
    60%{transform:translateX(-4px)}
    80%{transform:translateX(4px)}
  }

  .blink {
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* ===== MAIN DASHBOARD ===== */
  #dashboard {
    display: none;
    min-height: 100vh;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
    background: rgba(13,13,20,0.8);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .header-logo {
    font-family: 'Orbitron', monospace;
    font-size: 18px;
    font-weight: 900;
    color: #fff;
    letter-spacing: 3px;
  }

  .header-logo span { color: var(--accent); }

  .header-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 2px;
  }

  .status-dot {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s ease infinite;
  }

  @keyframes pulse {
    0%,100%{opacity:1;transform:scale(1)}
    50%{opacity:0.5;transform:scale(0.8)}
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .search-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    padding: 8px 16px;
    outline: none;
    width: 200px;
    transition: all 0.3s;
    letter-spacing: 1px;
  }

  .search-bar:focus {
    border-color: var(--accent);
    box-shadow: 0 0 10px rgba(0,255,157,0.15);
    width: 260px;
  }

  .search-bar::placeholder { color: var(--dim); }

  .add-btn {
    padding: 8px 20px;
    background: transparent;
    border: 1px solid var(--accent3);
    color: var(--accent3);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .add-btn:hover {
    background: rgba(123,47,255,0.15);
    box-shadow: 0 0 14px rgba(123,47,255,0.3);
  }

  .lock-btn {
    padding: 8px 16px;
    background: transparent;
    border: 1px solid var(--dim);
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .lock-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  /* Main content */
  .content {
    padding: 40px;
  }

  .section-header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 32px;
  }

  .section-title {
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 4px;
    color: var(--text);
    text-transform: uppercase;
  }

  .section-count {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 2px;
  }

  /* Game grid */
  .games-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }

  .game-card {
    background: var(--surface);
    border: 1px solid var(--border);
    position: relative;
    cursor: pointer;
    transition: all 0.25s;
    overflow: hidden;
    group: true;
  }

  .game-card:hover {
    border-color: var(--accent);
    transform: translateY(-3px);
    box-shadow: 0 8px 30px rgba(0,255,157,0.15);
  }

  .game-card:hover .card-overlay { opacity: 1; }
  .game-card:hover .play-btn { transform: translate(-50%,-50%) scale(1); }

  .card-thumb {
    height: 160px;
    background: linear-gradient(135deg, #0d0d22, #1a0a2e);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .card-thumb-icon {
    font-size: 56px;
    filter: grayscale(0.3);
    z-index: 1;
  }

  .card-thumb::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 60%, rgba(0,255,157,0.05));
  }

  .card-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,255,157,0.08);
    opacity: 0;
    transition: opacity 0.25s;
  }

  .play-btn {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%) scale(0.7);
    width: 52px; height: 52px;
    border: 2px solid var(--accent);
    background: rgba(0,255,157,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s;
    backdrop-filter: blur(4px);
    z-index: 2;
  }

  .play-btn::after {
    content: '';
    border-style: solid;
    border-width: 9px 0 9px 16px;
    border-color: transparent transparent transparent var(--accent);
    margin-left: 3px;
  }

  .card-body {
    padding: 18px 20px;
  }

  .card-tag {
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--accent3);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .card-name {
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .card-desc {
    font-size: 11px;
    color: var(--dim);
    line-height: 1.6;
    letter-spacing: 0.5px;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-top: 1px solid var(--border);
  }

  .card-id {
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 2px;
  }

  .card-delete {
    background: none;
    border: none;
    color: var(--dim);
    cursor: pointer;
    font-size: 13px;
    padding: 2px 6px;
    transition: color 0.2s;
  }

  .card-delete:hover { color: var(--accent2); }

  /* Add game modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(5,5,8,0.85);
    backdrop-filter: blur(8px);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    width: 500px;
    background: var(--surface);
    border: 1px solid var(--accent3);
    box-shadow: 0 0 60px rgba(123,47,255,0.2);
    padding: 40px;
    position: relative;
  }

  .modal-title {
    font-family: 'Orbitron', monospace;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 3px;
    color: #fff;
    margin-bottom: 30px;
  }

  .modal-title span { color: var(--accent3); }

  .form-group {
    margin-bottom: 20px;
  }

  .form-label {
    display: block;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--dim);
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .form-input {
    width: 100%;
    background: rgba(123,47,255,0.05);
    border: 1px solid var(--border);
    border-bottom-color: var(--accent3);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: all 0.3s;
    letter-spacing: 1px;
  }

  .form-input:focus {
    border-color: var(--accent3);
    box-shadow: 0 0 12px rgba(123,47,255,0.2);
  }

  .emoji-picker {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 8px;
  }

  .emoji-option {
    width: 36px; height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border);
    cursor: pointer;
    font-size: 20px;
    transition: all 0.2s;
  }

  .emoji-option:hover, .emoji-option.selected {
    border-color: var(--accent3);
    background: rgba(123,47,255,0.1);
  }

  .modal-actions {
    display: flex;
    gap: 12px;
    margin-top: 30px;
  }

  .btn-save {
    flex: 1;
    padding: 12px;
    background: transparent;
    border: 1px solid var(--accent3);
    color: var(--accent3);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn-save:hover {
    background: rgba(123,47,255,0.15);
    box-shadow: 0 0 16px rgba(123,47,255,0.25);
  }

  .btn-cancel {
    padding: 12px 24px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-cancel:hover { border-color: var(--accent2); color: var(--accent2); }

  .close-modal {
    position: absolute;
    top: 16px; right: 16px;
    background: none;
    border: none;
    color: var(--dim);
    font-size: 18px;
    cursor: pointer;
    transition: color 0.2s;
    font-family: monospace;
  }

  .close-modal:hover { color: var(--accent2); }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--dim);
  }

  .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
  .empty-text { font-size: 13px; letter-spacing: 2px; }

  /* Fade in animation */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .game-card { animation: fadeIn 0.3s ease forwards; }

  /* Settings modal for password change */
  .settings-area {
    margin-top: 30px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  .settings-title {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--dim);
    margin-bottom: 16px;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-box">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <div class="login-logo">// VAULT SYSTEM</div>
    <div class="login-title">GAME<span>VAULT</span></div>
    <div class="login-sub">AUTHORIZED ACCESS ONLY <span class="blink">_</span></div>
    <div class="input-group">
      <label class="input-label">ACCESS CODE</label>
      <input type="password" id="password-input" placeholder="••••••••" maxlength="32" autocomplete="off">
    </div>
    <button class="login-btn" onclick="checkPassword()">AUTHENTICATE →</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <header class="header">
    <div class="header-logo">GAME<span>VAULT</span></div>
    <div class="header-status">
      <div class="status-dot"></div>
      SECURE SESSION ACTIVE
    </div>
    <div class="header-actions">
      <input type="text" class="search-bar" id="search-input" placeholder="SEARCH GAMES..." oninput="renderGames()">
      <button class="add-btn" onclick="openModal()">+ ADD GAME</button>
      <button class="lock-btn" onclick="lockVault()">⬛ LOCK</button>
    </div>
  </header>

  <div class="content">
    <div class="section-header">
      <span class="section-title">GAME LIBRARY</span>
      <span class="section-count" id="game-count">0 TITLES</span>
    </div>
    <div class="games-grid" id="games-grid"></div>
  </div>
</div>

<!-- ADD GAME MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="close-modal" onclick="closeModal()">✕</button>
    <div class="modal-title">+ ADD <span>GAME</span></div>

    <div class="form-group">
      <label class="form-label">GAME NAME</label>
      <input type="text" class="form-input" id="game-name" placeholder="e.g. Modern Client">
    </div>

    <div class="form-group">
      <label class="form-label">GAME URL</label>
      <input type="text" class="form-input" id="game-url" placeholder="https://example.com/game">
    </div>

    <div class="form-group">
      <label class="form-label">DESCRIPTION (选填)</label>
      <input type="text" class="form-input" id="game-desc" placeholder="Brief description...">
    </div>

    <div class="form-group">
      <label class="form-label">CATEGORY</label>
      <input type="text" class="form-input" id="game-tag" placeholder="e.g. ACTION / PUZZLE / SHOOTER">
    </div>

    <div class="form-group">
      <label class="form-label">ICON</label>
      <div class="emoji-picker" id="emoji-picker"></div>
    </div>

    <div class="settings-area">
      <div class="settings-title">修改访问密码（留空则不修改）</div>
      <div class="form-group">
        <label class="form-label">NEW PASSWORD</label>
        <input type="password" class="form-input" id="new-password" placeholder="Leave blank to keep current">
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn-save" onclick="saveGame()">SAVE GAME</button>
      <button class="btn-cancel" onclick="closeModal()">CANCEL</button>
    </div>
  </div>
</div>

<script>
// ===== CONFIG =====
const DEFAULT_PASSWORD = 'admin123'; // 默认密码，首次使用可改
const STORAGE_KEY = 'gamevault_data';
const EMOJIS = ['🎮','🕹️','⚔️','🔫','🏎️','🧩','🎯','🏆','🌌','🔥','👾','🤖','🐉','🎲','🗡️','💣','🚀','🌀','⚡','🛡️'];

// ===== STATE =====
let state = loadState();
let selectedEmoji = '🎮';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return {
    password: DEFAULT_PASSWORD,
    games: [
      {
        id: 'g001',
        name: 'Modern Client',
        url: 'https://funkboytwt.github.io/modernclient/wasm/',
        desc: '现代客户端游戏',
        tag: 'ACTION',
        icon: '🎮'
      }
    ]
  };
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

// ===== AUTH =====
function checkPassword() {
  const input = document.getElementById('password-input').value;
  const errorEl = document.getElementById('login-error');
  if (input === state.password) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    renderGames();
  } else {
    errorEl.textContent = '// ACCESS DENIED — INVALID CODE';
    errorEl.style.animation = 'none';
    void errorEl.offsetWidth;
    errorEl.style.animation = 'shake 0.4s ease';
    document.getElementById('password-input').value = '';
    setTimeout(() => errorEl.textContent = '', 3000);
  }
}

document.getElementById('password-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkPassword();
});

function lockVault() {
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('password-input').value = '';
  document.getElementById('login-error').textContent = '';
}

// ===== GAME LAUNCH (about:blank trick) =====
function launchGame(url) {
  const win = window.open('about:blank', '_blank');
  if (!win) { alert('请允许弹出窗口！'); return; }

  win.document.write(`<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Game</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#000}
  iframe{width:100%;height:100%;border:none;display:block}
</style>
</head>
<body>
<iframe src="${url}" allowfullscreen allow="autoplay; fullscreen; pointer-lock; gamepad; cross-origin-isolated"></iframe>
</body>
</html>`);
  win.document.close();

  // Push about:blank to history to hide URL
  try { win.history.pushState({}, '', 'about:blank'); } catch(e) {}
}

// ===== RENDER =====
function renderGames() {
  const query = (document.getElementById('search-input')?.value || '').toLowerCase();
  const grid = document.getElementById('games-grid');
  const countEl = document.getElementById('game-count');

  const filtered = state.games.filter(g =>
    g.name.toLowerCase().includes(query) ||
    (g.desc || '').toLowerCase().includes(query) ||
    (g.tag || '').toLowerCase().includes(query)
  );

  countEl.textContent = `${filtered.length} TITLE${filtered.length !== 1 ? 'S' : ''}`;

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="empty-icon">🕳️</div>
      <div class="empty-text">${query ? 'NO RESULTS FOUND' : 'NO GAMES YET — ADD ONE ABOVE'}</div>
    </div>`;
    return;
  }

  grid.innerHTML = filtered.map((g, i) => `
    <div class="game-card" style="animation-delay:${i * 0.04}s" onclick="launchGame('${g.url}')">
      <div class="card-thumb">
        <div class="card-thumb-icon">${g.icon || '🎮'}</div>
        <div class="card-overlay"></div>
        <div class="play-btn"></div>
      </div>
      <div class="card-body">
        <div class="card-tag">${g.tag || 'GAME'}</div>
        <div class="card-name">${g.name}</div>
        <div class="card-desc">${g.desc || 'Click to play'}</div>
      </div>
      <div class="card-footer">
        <span class="card-id">#${g.id}</span>
        <button class="card-delete" onclick="event.stopPropagation();deleteGame('${g.id}')" title="删除">✕</button>
      </div>
    </div>
  `).join('');
}

// ===== MODAL =====
function openModal() {
  document.getElementById('modal').classList.add('open');
  document.getElementById('game-name').value = '';
  document.getElementById('game-url').value = '';
  document.getElementById('game-desc').value = '';
  document.getElementById('game-tag').value = '';
  document.getElementById('new-password').value = '';
  selectedEmoji = '🎮';
  renderEmojiPicker();
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function renderEmojiPicker() {
  const container = document.getElementById('emoji-picker');
  container.innerHTML = EMOJIS.map(e => `
    <div class="emoji-option ${e === selectedEmoji ? 'selected' : ''}" onclick="selectEmoji('${e}')">${e}</div>
  `).join('');
}

function selectEmoji(e) {
  selectedEmoji = e;
  renderEmojiPicker();
}

function saveGame() {
  const name = document.getElementById('game-name').value.trim();
  const url = document.getElementById('game-url').value.trim();
  const desc = document.getElementById('game-desc').value.trim();
  const tag = document.getElementById('game-tag').value.trim().toUpperCase();
  const newPwd = document.getElementById('new-password').value;

  if (!name || !url) { alert('请填写游戏名称和URL！'); return; }

  const id = 'g' + String(Date.now()).slice(-6);
  state.games.push({ id, name, url, desc, tag: tag || 'GAME', icon: selectedEmoji });

  if (newPwd) state.password = newPwd;

  saveState();
  closeModal();
  renderGames();
}

function deleteGame(id) {
  if (!confirm('确定删除这个游戏？')) return;
  state.games = state.games.filter(g => g.id !== id);
  saveState();
  renderGames();
}

// Init emoji picker
renderEmojiPicker();
</script>
</body>
</html>
