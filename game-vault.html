<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>游戏库系统 v3</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --bg: #050508;
    --surface: #0d0d14;
    --border: #1a1a2e;
    --accent: #00ff9d;
    --accent2: #ff2d78;
    --accent3: #7b2fff;
    --text: #c8d6e5;
    --dim: #4a5568;
    --glow: 0 0 20px rgba(0,255,157,0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
    pointer-events: none;
    z-index: 9999;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,157,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,157,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  #login-screen {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    background: var(--bg);
  }

  .login-box {
    width: 420px;
    border: 1px solid var(--accent);
    background: var(--surface);
    box-shadow: 0 0 40px rgba(0,255,157,0.15), inset 0 0 40px rgba(0,255,157,0.03);
    padding: 48px;
    position: relative;
  }

  .login-box::before {
    content: '';
    position: absolute;
    top: -1px; left: 20px;
    width: 60px; height: 2px;
    background: var(--bg);
  }

  .login-box::after {
    content: '';
    position: absolute;
    bottom: -1px; right: 20px;
    width: 60px; height: 2px;
    background: var(--bg);
  }

  .corner {
    position: absolute;
    width: 12px; height: 12px;
    border-color: var(--accent2);
    border-style: solid;
  }
  .corner.tl { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
  .corner.tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
  .corner.bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
  .corner.br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

  .login-logo {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 6px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 6px;
    opacity: 0.7;
  }

  .login-title {
    font-family: 'Orbitron', monospace;
    font-size: 26px;
    font-weight: 900;
    color: #fff;
    margin-bottom: 4px;
    letter-spacing: 2px;
  }

  .login-title span { color: var(--accent); }

  .login-sub {
    font-size: 11px;
    color: var(--dim);
    margin-bottom: 40px;
    letter-spacing: 2px;
  }

  .input-group {
    position: relative;
    margin-bottom: 24px;
  }

  .input-label {
    display: block;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--dim);
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .input-group input {
    width: 100%;
    background: rgba(0,255,157,0.03);
    border: 1px solid var(--border);
    border-bottom-color: var(--accent);
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    font-size: 18px;
    letter-spacing: 8px;
    padding: 12px 16px;
    outline: none;
    transition: all 0.3s;
    caret-color: var(--accent);
  }

  .input-group input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 16px rgba(0,255,157,0.2);
    background: rgba(0,255,157,0.06);
  }

  .login-btn {
    width: 100%;
    padding: 14px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Orbitron', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 4px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .login-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    transform: translateX(-100%);
    transition: transform 0.3s;
    z-index: -1;
  }

  .login-btn:hover {
    color: var(--bg);
    box-shadow: var(--glow);
  }

  .login-btn:hover::before { transform: translateX(0); }

  .login-error {
    font-size: 11px;
    color: var(--accent2);
    letter-spacing: 2px;
    margin-top: 16px;
    text-align: center;
    min-height: 16px;
  }

  @keyframes shake {
    0%,100%{transform:translateX(0)}
    20%{transform:translateX(-6px)}
    40%{transform:translateX(6px)}
    60%{transform:translateX(-4px)}
    80%{transform:translateX(4px)}
  }

  .blink { animation: blink 1s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  #home-page {
    display: none;
    min-height: 100vh;
    position: relative;
    z-index: 1;
  }

  .home-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 20px;
    text-align: center;
  }

  .home-logo {
    font-family: 'Orbitron', monospace;
    font-size: 48px;
    font-weight: 900;
    color: #fff;
    letter-spacing: 4px;
    margin-bottom: 20px;
  }

  .home-logo span { color: var(--accent); }

  .home-time {
    font-family: 'Share Tech Mono', monospace;
    font-size: 64px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 16px;
    letter-spacing: 2px;
    text-shadow: 0 0 20px rgba(0,255,157,0.3);
  }

  .home-date {
    font-size: 18px;
    color: var(--text);
    letter-spacing: 2px;
    margin-bottom: 40px;
  }

  .home-day {
    font-size: 16px;
    color: var(--dim);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 60px;
  }

  .home-buttons {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .home-btn {
    padding: 16px 32px;
    background: transparent;
    border: 2px solid var(--accent);
    color: var(--accent);
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 3px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .home-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    transform: translateY(100%);
    transition: transform 0.3s;
    z-index: -1;
  }

  .home-btn:hover {
    color: var(--bg);
    box-shadow: 0 0 20px rgba(0,255,157,0.4);
  }

  .home-btn:hover::before { transform: translateY(0); }

  #dashboard {
    display: none;
    min-height: 100vh;
    position: relative;
    z-index: 1;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
    background: rgba(13,13,20,0.8);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 30px;
  }

  .header-logo {
    font-family: 'Orbitron', monospace;
    font-size: 18px;
    font-weight: 900;
    color: #fff;
    letter-spacing: 3px;
  }

  .header-logo span { color: var(--accent); }

  .header-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 2px;
  }

  .status-dot {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s ease infinite;
  }

  @keyframes pulse {
    0%,100%{opacity:1;transform:scale(1)}
    50%{opacity:0.5;transform:scale(0.8)}
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .search-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    padding: 8px 16px;
    outline: none;
    width: 200px;
    transition: all 0.3s;
    letter-spacing: 1px;
  }

  .search-bar:focus {
    border-color: var(--accent);
    box-shadow: 0 0 10px rgba(0,255,157,0.15);
    width: 260px;
  }

  .search-bar::placeholder { color: var(--dim); }

  .add-btn {
    padding: 8px 20px;
    background: transparent;
    border: 1px solid var(--accent3);
    color: var(--accent3);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .add-btn:hover {
    background: rgba(123,47,255,0.15);
    box-shadow: 0 0 14px rgba(123,47,255,0.3);
  }

  .settings-btn {
    padding: 8px 16px;
    background: transparent;
    border: 1px solid var(--dim);
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .settings-btn:hover { border-color: var(--accent3); color: var(--accent3); }

  .lock-btn {
    padding: 8px 16px;
    background: transparent;
    border: 1px solid var(--dim);
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .lock-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  .content { padding: 40px; }

  .section-header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 32px;
  }

  .section-title {
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 4px;
    color: var(--text);
    text-transform: uppercase;
  }

  .section-count {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 2px;
  }

  .games-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }

  .game-card {
    background: var(--surface);
    border: 1px solid var(--border);
    position: relative;
    cursor: pointer;
    transition: all 0.25s;
    overflow: hidden;
  }

  .game-card:hover {
    border-color: var(--accent);
    transform: translateY(-3px);
    box-shadow: 0 8px 30px rgba(0,255,157,0.15);
  }

  .game-card:hover .card-overlay { opacity: 1; }
  .game-card:hover .play-btn { transform: translate(-50%,-50%) scale(1); }

  .card-thumb {
    height: 160px;
    background: linear-gradient(135deg, #0d0d22, #1a0a2e);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .card-thumb-icon {
    font-size: 56px;
    filter: grayscale(0.3);
    z-index: 1;
  }

  .card-thumb::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 60%, rgba(0,255,157,0.05));
  }

  .card-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,255,157,0.08);
    opacity: 0;
    transition: opacity 0.25s;
  }

  .play-btn {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%) scale(0.7);
    width: 52px; height: 52px;
    border: 2px solid var(--accent);
    background: rgba(0,255,157,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s;
    backdrop-filter: blur(4px);
    z-index: 2;
  }

  .play-btn::after {
    content: '';
    border-style: solid;
    border-width: 9px 0 9px 16px;
    border-color: transparent transparent transparent var(--accent);
    margin-left: 3px;
  }

  .card-body { padding: 18px 20px; }

  .card-tag {
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--accent3);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .card-name {
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .card-desc {
    font-size: 11px;
    color: var(--dim);
    line-height: 1.6;
    letter-spacing: 0.5px;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-top: 1px solid var(--border);
  }

  .card-id {
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 2px;
  }

  .card-delete {
    background: none;
    border: none;
    color: var(--dim);
    cursor: pointer;
    font-size: 13px;
    padding: 2px 6px;
    transition: color 0.2s;
  }

  .card-delete:hover { color: var(--accent2); }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(5,5,8,0.85);
    backdrop-filter: blur(8px);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    width: 500px;
    background: var(--surface);
    border: 1px solid var(--accent3);
    box-shadow: 0 0 60px rgba(123,47,255,0.2);
    padding: 40px;
    position: relative;
    max-height: 90vh;
    overflow-y: auto;
  }

  .settings-modal {
    width: 500px;
    background: var(--surface);
    border: 1px solid var(--accent);
    box-shadow: 0 0 60px rgba(0,255,157,0.2);
    padding: 40px;
    position: relative;
    max-height: 90vh;
    overflow-y: auto;
  }

  .modal-title {
    font-family: 'Orbitron', monospace;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 3px;
    color: #fff;
    margin-bottom: 30px;
  }

  .modal-title span { color: var(--accent3); }

  .form-group { margin-bottom: 20px; }

  .form-label {
    display: block;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--dim);
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .form-input {
    width: 100%;
    background: rgba(123,47,255,0.05);
    border: 1px solid var(--border);
    border-bottom-color: var(--accent3);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: all 0.3s;
    letter-spacing: 1px;
  }

  .form-input:focus {
    border-color: var(--accent3);
    box-shadow: 0 0 12px rgba(123,47,255,0.2);
    background: rgba(123,47,255,0.08);
  }

  .emoji-picker {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 8px;
  }

  .emoji-option {
    width: 36px; height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border);
    cursor: pointer;
    font-size: 20px;
    transition: all 0.2s;
  }

  .emoji-option:hover, .emoji-option.selected {
    border-color: var(--accent3);
    background: rgba(123,47,255,0.1);
  }

  .modal-actions {
    display: flex;
    gap: 12px;
    margin-top: 30px;
  }

  .btn-save {
    flex: 1;
    padding: 12px;
    background: transparent;
    border: 1px solid var(--accent3);
    color: var(--accent3);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn-save:hover {
    background: rgba(123,47,255,0.15);
    box-shadow: 0 0 16px rgba(123,47,255,0.25);
  }

  .btn-cancel {
    padding: 12px 24px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-cancel:hover { border-color: var(--accent2); color: var(--accent2); }

  .close-modal {
    position: absolute;
    top: 16px; right: 16px;
    background: none;
    border: none;
    color: var(--dim);
    font-size: 18px;
    cursor: pointer;
    transition: color 0.2s;
    font-family: monospace;
  }

  .close-modal:hover { color: var(--accent2); }

  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--dim);
  }

  .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
  .empty-text { font-size: 13px; letter-spacing: 2px; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .game-card { animation: fadeIn 0.3s ease forwards; }

  .color-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin: 16px 0;
  }

  .color-option {
    width: 100%;
    aspect-ratio: 1;
    border: 2px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .color-option:hover, .color-option.selected {
    border-color: var(--accent);
    box-shadow: 0 0 12px rgba(0,255,157,0.3);
  }

  .color-option.selected::after {
    content: '✓';
    color: var(--accent);
    font-size: 20px;
    font-weight: bold;
  }

  .toggle-group {
    display: flex;
    gap: 8px;
    margin: 12px 0;
  }

  .toggle-btn {
    flex: 1;
    padding: 10px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .toggle-btn.active {
    background: rgba(0,255,157,0.15);
    border-color: var(--accent);
    color: var(--accent);
  }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <div class="login-logo">// 保险库系统</div>
    <div class="login-title">游戏<span>库</span></div>
    <div class="login-sub">授权访问 <span class="blink">_</span></div>
    <div class="input-group">
      <label class="input-label">访问密码</label>
      <input type="password" id="password-input" placeholder="••••••••" maxlength="32" autocomplete="off">
    </div>
    <button class="login-btn" onclick="checkPassword()">验证 →</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div id="home-page">
  <div class="home-container">
    <div class="home-logo">游戏<span>库</span></div>
    <div class="home-time" id="current-time">00:00:00</div>
    <div class="home-date" id="current-date">2024-01-01</div>
    <div class="home-day" id="current-day">星期一</div>
    <div class="home-buttons">
      <button class="home-btn" onclick="goToDashboard()">进入库 ENTER</button>
      <button class="home-btn" onclick="lockVault()">返回 BACK</button>
    </div>
  </div>
</div>

<div id="dashboard">
  <header class="header">
    <div class="header-left">
      <div class="header-logo">游戏<span>库</span></div>
      <div class="header-status">
        <div class="status-dot"></div>
        安全会话活跃
      </div>
    </div>
    <div class="header-actions">
      <input type="text" class="search-bar" id="search-input" placeholder="搜索游戏..." oninput="renderGames()">
      <button class="add-btn" onclick="openModal()">+ 添加游戏</button>
      <button class="settings-btn" onclick="openSettings()">⚙ 设置</button>
      <button class="lock-btn" onclick="lockVault()">🔒 锁定</button>
    </div>
  </header>
  <div class="content">
    <div class="section-header">
      <span class="section-title">游戏库</span>
      <span class="section-count" id="game-count">0 个游戏</span>
    </div>
    <div class="games-grid" id="games-grid"></div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="close-modal" onclick="closeModal()">✕</button>
    <div class="modal-title">+ 添加<span>游戏</span></div>
    <div class="form-group">
      <label class="form-label">游戏名称</label>
      <input type="text" class="form-input" id="game-name" placeholder="例如: 现代客户端">
    </div>
    <div class="form-group">
      <label class="form-label">游戏地址</label>
      <input type="text" class="form-input" id="game-url" placeholder="https://example.com/game">
    </div>
    <div class="form-group">
      <label class="form-label">游戏描述（可选）</label>
      <input type="text" class="form-input" id="game-desc" placeholder="简短描述...">
    </div>
    <div class="form-group">
      <label class="form-label">游戏分类</label>
      <input type="text" class="form-input" id="game-tag" placeholder="例如: 动作 / 益智 / 射击">
    </div>
    <div class="form-group">
      <label class="form-label">游戏图标</label>
      <div class="emoji-picker" id="emoji-picker"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-save" onclick="saveGame()">保存游戏</button>
      <button class="btn-cancel" onclick="closeModal()">取消</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="settings-modal">
  <div class="settings-modal">
    <button class="close-modal" onclick="closeSettings()">✕</button>
    <div class="modal-title">系<span>统</span>设置</div>
    <div class="form-group">
      <label class="form-label">主题颜色</label>
      <div class="color-grid" id="color-grid"></div>
    </div>
    <div class="form-group">
      <label class="form-label">背景颜色</label>
      <div class="toggle-group" id="bg-toggle"></div>
    </div>
    <div class="form-group">
      <label class="form-label">背景音乐</label>
      <div class="toggle-group" id="music-select"></div>
    </div>
    <div class="form-group">
      <label class="form-label">音乐音量</label>
      <input type="range" class="form-input" id="music-volume" min="0" max="100" value="30" style="padding:0;height:8px;cursor:pointer">
      <div style="font-size:10px;color:var(--dim);margin-top:8px" id="volume-display">30%</div>
    </div>
    <div class="form-group">
      <label class="form-label">键盘音效 (ASMR)</label>
      <div class="toggle-group">
        <button class="toggle-btn active" id="keyboard-sound-toggle" onclick="toggleKeyboardSound()" style="width:100%">启用</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-save" onclick="closeSettings()" style="flex:1">确认</button>
    </div>
  </div>
</div>

<audio id="music-player" loop></audio>

<script>
const CORRECT_PASSWORD = '12186010';
const STORAGE_KEY = 'gamevault_data_v3';
const SETTINGS_KEY = 'gamevault_settings_v3';
const EMOJIS = ['🎮','🕹️','⚔️','🔫','🏎️','🧩','🎯','🏆','🌌','🔥','👾','🤖','🐉','🎲','🗡️','💣','🚀','🌀','⚡','🛡️'];

const COLORS = {
  green: { accent: '#00ff9d', accent2: '#ff2d78', accent3: '#7b2fff' },
  red: { accent: '#ff3333', accent2: '#ff6b6b', accent3: '#ff0000' },
  blue: { accent: '#00bfff', accent2: '#1e90ff', accent3: '#0099ff' },
  white: { accent: '#ffffff', accent2: '#e0e0e0', accent3: '#cccccc' },
  yellow: { accent: '#ffff00', accent2: '#ffaa00', accent3: '#ffcc00' },
  gray: { accent: '#888888', accent2: '#666666', accent3: '#999999' }
};

const BACKGROUNDS = {
  black: '#050508',
  white: '#f5f5f5',
  dark: '#0d0d14'
};

const MUSIC_TRACKS = {
  ambient: 'https://www.youtube.com/watch?v=tayfXQfFDZE',
  lofi: 'https://www.youtube.com/watch?v=HdVU6LI-3VY',
  calm: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3',
  chillwave: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3'
};

let state = loadState();
let settings = loadSettings();
let selectedEmoji = '🎮';
let keyboardSoundEnabled = settings.keyboardSound;
let musicPlayer = document.getElementById('music-player');
let audioContext = null;

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return {
    games: [
      {
        id: 'g001',
        name: '现代客户端',
        url: 'https://funkboytwt.github.io/modernclient/wasm/',
        desc: '一个精美的现代游戏客户端',
        tag: '动作',
        icon: '🎮'
      }
    ]
  };
}

function loadSettings() {
  try {
    const raw = localStorage.getItem(SETTINGS_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return {
    colorTheme: 'green',
    backgroundColor: 'black',
    musicTrack: 'calm',
    musicVolume: 30,
    keyboardSound: true
  };
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function saveSettings() {
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
  applySettings();
}

function applySettings() {
  const colors = COLORS[settings.colorTheme] || COLORS.green;
  const bgColor = BACKGROUNDS[settings.backgroundColor] || BACKGROUNDS.black;
  
  document.documentElement.style.setProperty('--accent', colors.accent);
  document.documentElement.style.setProperty('--accent2', colors.accent2);
  document.documentElement.style.setProperty('--accent3', colors.accent3);
  document.documentElement.style.setProperty('--bg', bgColor);
  
  if (settings.backgroundColor === 'white') {
    document.documentElement.style.setProperty('--text', '#333333');
    document.documentElement.style.setProperty('--dim', '#666666');
    document.documentElement.style.setProperty('--surface', '#ffffff');
    document.documentElement.style.setProperty('--border', '#dddddd');
  } else {
    document.documentElement.style.setProperty('--text', '#c8d6e5');
    document.documentElement.style.setProperty('--dim', '#4a5568');
    document.documentElement.style.setProperty('--surface', '#0d0d14');
    document.documentElement.style.setProperty('--border', '#1a1a2e');
  }

  musicPlayer.volume = settings.musicVolume / 100;
  keyboardSoundEnabled = settings.keyboardSound;
}

function updateTime() {
  const now = new Date();
  const hours = String(now.getHours()).padStart(2, '0');
  const minutes = String(now.getMinutes()).padStart(2, '0');
  const seconds = String(now.getSeconds()).padStart(2, '0');
  
  const timeEl = document.getElementById('current-time');
  if (timeEl) timeEl.textContent = `${hours}:${minutes}:${seconds}`;

  const dateEl = document.getElementById('current-date');
  if (dateEl) dateEl.textContent = now.toLocaleDateString('zh-CN');

  const dayEl = document.getElementById('current-day');
  if (dayEl) {
    const days = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
    dayEl.textContent = days[now.getDay()];
  }
}

setInterval(updateTime, 1000);
updateTime();

// 初始化 AudioContext
function initAudioContext() {
  if (!audioContext) {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioContext;
}

// ASMR 键盘音效 - 多种声音混合
function playKeyboardSound() {
  if (!keyboardSoundEnabled) return;
  
  try {
    const ctx = initAudioContext();
    const now = ctx.currentTime;
    
    // 主音 - 低频
    const osc1 = ctx.createOscillator();
    const gain1 = ctx.createGain();
    osc1.type = 'sine';
    osc1.frequency.setValueAtTime(180 + Math.random() * 40, now);
    osc1.frequency.exponentialRampToValueAtTime(100, now + 0.08);
    gain1.gain.setValueAtTime(0.03, now);
    gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.06);
    osc1.connect(gain1);
    gain1.connect(ctx.destination);
    
    // 高频 - 清脆音
    const osc2 = ctx.createOscillator();
    const gain2 = ctx.createGain();
    osc2.type = 'triangle';
    osc2.frequency.setValueAtTime(800 + Math.random() * 200, now);
    osc2.frequency.exponentialRampToValueAtTime(300, now + 0.05);
    gain2.gain.setValueAtTime(0.02, now);
    gain2.gain.exponentialRampToValueAtTime(0.005, now + 0.05);
    osc2.connect(gain2);
    gain2.connect(ctx.destination);
    
    // 敲击音 - 噪声
    const noiseBuffer = ctx.createBuffer(1, ctx.sampleRate * 0.05, ctx.sampleRate);
    const noiseData = noiseBuffer.getChannelData(0);
    for (let i = 0; i < noiseBuffer.length; i++) {
      noiseData[i] = Math.random() * 2 - 1;
    }
    const noiseSource = ctx.createBufferSource();
    noiseSource.buffer = noiseBuffer;
    const noiseGain = ctx.createGain();
    noiseGain.gain.setValueAtTime(0.04, now);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
    noiseSource.connect(noiseGain);
    noiseGain.connect(ctx.destination);
    
    osc1.start(now);
    osc1.stop(now + 0.08);
    osc2.start(now);
    osc2.stop(now + 0.05);
    noiseSource.start(now);
  } catch(e) {
    console.log('音效播放失败:', e);
  }
}

// 键盘事件监听
document.addEventListener('keydown', (e) => {
  playKeyboardSound();
});

function checkPassword() {
  const input = document.getElementById('password-input').value;
  const errorEl = document.getElementById('login-error');
  
  if (input === CORRECT_PASSWORD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('home-page').style.display = 'block';
    renderGames();
    playBackgroundMusic();
  } else {
    errorEl.textContent = '// 访问被拒绝 — 密码错误';
    errorEl.style.animation = 'shake 0.4s ease';
    document.getElementById('password-input').value = '';
    setTimeout(() => errorEl.textContent = '', 3000);
  }
}

document.getElementById('password-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkPassword();
});

function goToDashboard() {
  document.getElementById('home-page').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
}

function lockVault() {
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('home-page').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('password-input').value = '';
  document.getElementById('login-error').textContent = '';
  musicPlayer.pause();
}

function playBackgroundMusic() {
  try {
    // 使用本地音源
    const trackUrl = MUSIC_TRACKS[settings.musicTrack] || MUSIC_TRACKS.calm;
    
    // 如果是 YouTube URL，转换为嵌入式播放 URL
    let audioUrl = trackUrl;
    if (trackUrl.includes('youtube.com') || trackUrl.includes('youtu.be')) {
      // 使用免费的音乐源替代
      const tracks = [
        'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3',
        'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3'
      ];
      audioUrl = tracks[Math.floor(Math.random() * tracks.length)];
    }
    
    musicPlayer.src = audioUrl;
    musicPlayer.volume = settings.musicVolume / 100;
    musicPlayer.play().catch((err) => {
      console.log('音乐播放失败 (需要交互):', err);
    });
  } catch(e) {
    console.log('音乐初始化失败:', e);
  }
}

function launchGame(url) {
  const win = window.open('about:blank', '_blank');
  if (!win) { alert('请允许弹出窗口！'); return; }
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>游戏</title><style>*{margin:0;padding:0;box-sizing:border-box}html,body{width:100%;height:100%;overflow:hidden;background:#000}iframe{width:100%;height:100%;border:none;display:block}</style></head><body><iframe src="${url}" allowfullscreen allow="autoplay; fullscreen; pointer-lock; gamepad; cross-origin-isolated"></iframe></body></html>`);
  win.document.close();
  try { win.history.pushState({}, '', 'about:blank'); } catch(e) {}
}

function renderGames() {
  const query = (document.getElementById('search-input')?.value || '').toLowerCase();
  const grid = document.getElementById('games-grid');
  const countEl = document.getElementById('game-count');

  const filtered = state.games.filter(g =>
    g.name.toLowerCase().includes(query) ||
    (g.desc || '').toLowerCase().includes(query) ||
    (g.tag || '').toLowerCase().includes(query)
  );

  countEl.textContent = `${filtered.length} 个游戏`;

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🕳️</div><div class="empty-text">${query ? '未找到结果' : '暂无游戏 — 点击上方添加'}</div></div>`;
    return;
  }

  grid.innerHTML = filtered.map((g, i) => `
    <div class="game-card" style="animation-delay:${i * 0.04}s" onclick="launchGame('${g.url}')">
      <div class="card-thumb">
        <div class="card-thumb-icon">${g.icon || '🎮'}</div>
        <div class="card-overlay"></div>
        <div class="play-btn"></div>
      </div>
      <div class="card-body">
        <div class="card-tag">${g.tag || '游戏'}</div>
        <div class="card-name">${g.name}</div>
        <div class="card-desc">${g.desc || '点击游玩'}</div>
      </div>
      <div class="card-footer">
        <span class="card-id">#${g.id}</span>
        <button class="card-delete" onclick="event.stopPropagation();deleteGame('${g.id}')" title="删除">✕</button>
      </div>
    </div>
  `).join('');
}

function openSettings() {
  document.getElementById('settings-modal').classList.add('open');
  renderColorGrid();
  renderBGToggle();
  renderMusicSelect();
  updateVolumeDisplay();
  updateKeyboardSoundButton();
}

function closeSettings() {
  document.getElementById('settings-modal').classList.remove('open');
}

function renderColorGrid() {
  const grid = document.getElementById('color-grid');
  grid.innerHTML = Object.keys(COLORS).map(key => `
    <div class="color-option ${settings.colorTheme === key ? 'selected' : ''}" 
         onclick="changeColorTheme('${key}')" 
         style="background:${COLORS[key].accent}"></div>
  `).join('');
}

function renderBGToggle() {
  const toggle = document.getElementById('bg-toggle');
  toggle.innerHTML = Object.keys(BACKGROUNDS).map(key => `
    <button class="toggle-btn ${settings.backgroundColor === key ? 'active' : ''}" 
            onclick="changeBackground('${key}')">${key === 'black' ? '黑色' : key === 'white' ? '白色' : '深灰'}</button>
  `).join('');
}

function renderMusicSelect() {
  const select = document.getElementById('music-select');
  select.innerHTML = Object.keys(MUSIC_TRACKS).map(key => `
    <button class="toggle-btn ${settings.musicTrack === key ? 'active' : ''}" 
            onclick="changeMusic('${key}')">${key === 'calm' ? '宁静' : key === 'ambient' ? '环境' : key === 'lofi' ? 'LoFi' : 'Chill'}</button>
  `).join('');
}

function changeColorTheme(theme) {
  settings.colorTheme = theme;
  saveSettings();
  renderColorGrid();
}

function changeBackground(bg) {
  settings.backgroundColor = bg;
  saveSettings();
  renderBGToggle();
}

function changeMusic(track) {
  settings.musicTrack = track;
  saveSettings();
  playBackgroundMusic();
  renderMusicSelect();
}

function toggleKeyboardSound() {
  settings.keyboardSound = !settings.keyboardSound;
  keyboardSoundEnabled = settings.keyboardSound;
  saveSettings();
  updateKeyboardSoundButton();
}

function updateKeyboardSoundButton() {
  const btn = document.getElementById('keyboard-sound-toggle');
  if (btn) {
    btn.textContent = settings.keyboardSound ? '启用' : '禁用';
    btn.classList.toggle('active', settings.keyboardSound);
  }
}

function openModal() {
  document.getElementById('modal').classList.add('open');
  document.getElementById('game-name').value = '';
  document.getElementById('game-url').value = '';
  document.getElementById('game-desc').value = '';
  document.getElementById('game-tag').value = '';
  selectedEmoji = '🎮';
  renderEmojiPicker();
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function renderEmojiPicker() {
  const container = document.getElementById('emoji-picker');
  container.innerHTML = EMOJIS.map(e => `
    <div class="emoji-option ${e === selectedEmoji ? 'selected' : ''}" onclick="selectEmoji('${e}')">${e}</div>
  `).join('');
}

function selectEmoji(e) {
  selectedEmoji = e;
  renderEmojiPicker();
}

function saveGame() {
  const name = document.getElementById('game-name').value.trim();
  const url = document.getElementById('game-url').value.trim();
  const desc = document.getElementById('game-desc').value.trim();
  const tag = document.getElementById('game-tag').value.trim().toUpperCase();

  if (!name || !url) { alert('请填写游戏名称和URL！'); return; }

  const id = 'g' + String(Date.now()).slice(-6);
  state.games.push({ id, name, url, desc, tag: tag || '游戏', icon: selectedEmoji });

  saveState();
  closeModal();
  renderGames();
}

function deleteGame(id) {
  if (!confirm('确定删除这个游戏？')) return;
  state.games = state.games.filter(g => g.id !== id);
  saveState();
  renderGames();
}

document.getElementById('music-volume').addEventListener('input', (e) => {
  settings.musicVolume = parseInt(e.target.value);
  musicPlayer.volume = settings.musicVolume / 100;
  updateVolumeDisplay();
});

function updateVolumeDisplay() {
  document.getElementById('volume-display').textContent = settings.musicVolume + '%';
}

applySettings();
renderEmojiPicker();
</script>
</body>
</html>
