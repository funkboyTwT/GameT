<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>进入游戏</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #2a2a3a;
    --accent: #c8a96e;
    --accent-dim: rgba(200,169,110,0.15);
    --text: #e8e0d0;
    --muted: #5a5570;
    --danger: #e05c5c;
    --danger-dim: rgba(224,92,92,0.15);
    --success: #5cba8a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif SC', serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(200,169,110,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,169,110,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* Glow orb */
  body::after {
    content: '';
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(200,169,110,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .card {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 3rem 3.5rem;
    width: 360px;
    text-align: center;
    animation: fadeIn 0.8s ease forwards;
  }

  /* Corner decorations */
  .card::before, .card::after {
    content: '';
    position: absolute;
    width: 20px;
    height: 20px;
    border-color: var(--accent);
    border-style: solid;
  }
  .card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
  .card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

  .icon {
    width: 56px;
    height: 56px;
    margin: 0 auto 1.5rem;
    border: 1px solid var(--border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--accent-dim);
  }

  .icon svg {
    width: 24px;
    height: 24px;
    stroke: var(--accent);
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  h1 {
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--text);
    margin-bottom: 0.4rem;
  }

  .subtitle {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    margin-bottom: 2rem;
    font-family: 'Share Tech Mono', monospace;
  }

  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin-bottom: 2rem;
  }

  .dots {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin-bottom: 2rem;
  }

  .dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 1.5px solid var(--muted);
    background: transparent;
    transition: all 0.2s ease;
  }

  .dot.filled {
    border-color: var(--accent);
    background: var(--accent);
    box-shadow: 0 0 8px rgba(200,169,110,0.5);
  }

  .dot.error {
    border-color: var(--danger);
    background: var(--danger);
    animation: shake 0.4s ease;
  }

  .numpad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 1.5rem;
  }

  .key {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.1rem;
    padding: 14px 0;
    cursor: pointer;
    transition: all 0.15s ease;
    position: relative;
    overflow: hidden;
  }

  .key:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }

  .key:active {
    transform: scale(0.95);
  }

  .key.del {
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    color: var(--muted);
  }

  .key.del:hover { color: var(--danger); border-color: var(--danger); background: var(--danger-dim); }

  .key.zero { grid-column: 2; }

  .msg {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    height: 20px;
    transition: all 0.3s;
  }

  .msg.error { color: var(--danger); }
  .msg.success { color: var(--success); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25%      { transform: translateX(-4px); }
    75%      { transform: translateX(4px); }
  }

  @keyframes unlock {
    0%   { border-color: var(--border); }
    50%  { border-color: var(--success); box-shadow: 0 0 30px rgba(92,186,138,0.2); }
    100% { border-color: var(--border); }
  }

  .card.unlocking { animation: unlock 0.6s ease; }
</style>
</head>
<body>

<div class="card" id="card">
  <div class="icon">
    <svg viewBox="0 0 24 24">
      <rect x="3" y="11" width="18" height="11" rx="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
  </div>
  <h1>访问验证</h1>
  <p class="subtitle">ENTER ACCESS CODE</p>
  <div class="divider"></div>

  <div class="dots" id="dots">
    <div class="dot" id="d0"></div>
    <div class="dot" id="d1"></div>
    <div class="dot" id="d2"></div>
    <div class="dot" id="d3"></div>
  </div>

  <div class="numpad">
    <button class="key" onclick="press('1')">1</button>
    <button class="key" onclick="press('2')">2</button>
    <button class="key" onclick="press('3')">3</button>
    <button class="key" onclick="press('4')">4</button>
    <button class="key" onclick="press('5')">5</button>
    <button class="key" onclick="press('6')">6</button>
    <button class="key" onclick="press('7')">7</button>
    <button class="key" onclick="press('8')">8</button>
    <button class="key" onclick="press('9')">9</button>
    <button class="key del" onclick="del()">DEL</button>
    <button class="key zero" onclick="press('0')">0</button>
    <div></div>
  </div>

  <p class="msg" id="msg"></p>
</div>

<script>
  const PASSWORD = '1860';
  let input = '';

  function press(n) {
    if (input.length >= 4) return;
    input += n;
    updateDots();
    if (input.length === 4) setTimeout(check, 150);
  }

  function del() {
    input = input.slice(0, -1);
    updateDots();
    setMsg('', '');
  }

  function updateDots() {
    for (let i = 0; i < 4; i++) {
      const d = document.getElementById('d' + i);
      d.className = 'dot' + (i < input.length ? ' filled' : '');
    }
  }

  function setMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg ' + type;
  }

  function check() {
    if (input === PASSWORD) {
      setMsg('验证成功，正在进入...', 'success');
      document.getElementById('card').classList.add('unlocking');
      for (let i = 0; i < 4; i++) {
        const d = document.getElementById('d' + i);
        d.style.borderColor = '#5cba8a';
        d.style.background = '#5cba8a';
      }
      setTimeout(() => { window.location.href = 'Game.zip'; }, 800);
    } else {
      setMsg('密码错误，请重试', 'error');
      for (let i = 0; i < 4; i++) {
        document.getElementById('d' + i).className = 'dot error';
      }
      setTimeout(() => { input = ''; updateDots(); setMsg('', ''); }, 800);
    }
  }

  // Keyboard support
  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') press(e.key);
    if (e.key === 'Backspace') del();
  });
</script>
</body>
</html>
