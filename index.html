<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统验证</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #121214;
            color: #f3f4f6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .auth-container {
            background-color: #1e1e24;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            text-align: center;
            width: 100%;
            max-width: 360px;
        }
        .auth-container h2 { margin-bottom: 1.5rem; font-size: 1.5rem; color: #fff; }
        .auth-container input {
            width: 100%; padding: 12px; border: 2px solid #3f3f46; border-radius: 6px;
            background-color: #121214; color: #fff; font-size: 1rem; box-sizing: border-box;
            margin-bottom: 1rem; outline: none;
        }
        .auth-container button {
            width: 100%; padding: 12px; background-color: #6366f1; border: none;
            border-radius: 6px; color: #fff; font-size: 1rem; font-weight: bold; cursor: pointer;
        }
        .error-msg { color: #ef4444; font-size: 0.875rem; margin-top: 0.5rem; display: none; }
    </style>
</head>
<body>

    <div class="auth-container">
        <h2>🔒 输入访问密码</h2>
        <input type="password" id="passwordInput" placeholder="请输入密码..." onkeydown="if(event.key==='Enter') verifyPassword()">
        <button onclick="verifyPassword()">解锁游戏</button>
        <div class="error-msg" id="errorMsg">密码错误，请重新输入！</div>
    </div>

    <script>
        // 你指定的访问密码
        const CORRECT_PASSWORD = "12186010"; 

        // 核心：直接在 about:blank 里全屏嵌入并运行游戏
        const gamePageHTML = `
        <!DOCTYPE html>
        <html>
        <head>
            <meta charset="UTF-8">
            <title>我的私密游戏</title>
            <style>
                html, body {
                    margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000;
                }
                iframe {
                    width: 100%; height: 100%; border: none; display: block;
                }
            </style>
        </head>
        <body>
            <!-- 直接全屏嵌入运行你的现代我的世界客户端 -->
            <iframe src="https://github.io"></iframe>
        </body>
        </html>
        `;

        function verifyPassword() {
            const input = document.getElementById('passwordInput').value;
            const errorMsg = document.getElementById('errorMsg');

            if (input === CORRECT_PASSWORD) {
                // 打开一个干净的全局 about:blank 新标签页
                const blankWindow = window.open('about:blank', '_blank');
                
                if (blankWindow) {
                    // 强制在空白页内存中渲染整个游戏
                    blankWindow.document.open();
                    blankWindow.document.write(gamePageHTML);
                    blankWindow.document.close();
                    
                    // 自动关掉原本带密码输入框的验证文件
                    window.opener = null;
                    window.close();
                } else {
                    alert("请允许浏览器弹出窗口以加载游戏！");
                }
            } else {
                errorMsg.style.display = 'block';
                document.getElementById('passwordInput').value = '';
                document.getElementById('passwordInput').focus();
            }
        }
    </script>
</body>
</html>
